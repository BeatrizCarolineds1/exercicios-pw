<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival de Personagens</title>
    <link rel="stylesheet" href="styleex2.css">
</head>
<body>
    <header>
        <h1>festival de personagens</h1>
    </header>
    <main class="container-personagens">
        <div class="card-personagem">
            <div class="card-img-container-personagens">
                <img class="card-img-personagens" src="lagoona.jpg" alt="Personagem">
            </div>
            <h2>Lagoona Blue</h2>
            <p>A filhinha do monstro do lago ness.</p>
        </div>
        <div class="card-personagem">
            <div class="card-img-container-personagens">
                <img class="card-img-personagens" src="clawdeen.jpg" alt="Personagem">
            </div>
            <h2>clawdeen wolf</h2>
            <p>A loba mais fashion de monster high.</p>
        
        </div>
        <div class="card-personagem">
            <div class="card-img-container-personagens">
                <img class="card-img-personagens" src="draculaura-pw.png" alt="Personagem">
            </div>
            <h2>Draculaura</h2>
            <p>A filha do conde drácula, vampirinha vegetariana.</p>
        
        </div>
        <div class="card-personagem">
            <div class="card-img-container-personagens">
                <img class="card-img-personagens" src="frankie-pw2.jpg" alt="Personagem">
            </div>
            <h2>frankie stein</h2>
            <p>Uma jovem eletrizante, de deixar os cabelos em pé.</p>
        </div>
    </main>
</body>
</html>
