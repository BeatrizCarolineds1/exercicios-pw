<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Catálogo de Produtos</h1>
    </header>
    <main class="container-produtos">
        <div class="card-produto">
            <div class="card-img-container">
                <img class="card-img" src="galaxy.png" alt="Produto">
            </div>
            <div class="card-info">
                <h2>Produto 1</h2>
                <p>Galaxy A06 Samsung.</p>
                <span>R$ 99,90</span>
            </div>
            <button>Comprar</button>
        </div>
        <div class="card-produto">
            <div class="card-img-container">
                <img class="card-img" src="iphone.png" alt="Produto">
            </div>
            <h2>Produto 2</h2>
            <p>IPhone 14 Apple.</p>
            <span>R$ 149,90</span>
            <button>Comprar</button>
        </div>
        <div class="card-produto">
            <div class="card-img-container">
                <img class="card-img" src="redmi.png" alt="Produto">
            </div>
            <h2>Produto 3</h2>
            <p>Redmi Note 12.</p>
            <span>R$ 199,90</span>
            <button>Comprar</button>
        </div>
        <div class="card-produto">
            <div class="card-img-container">
                <img class="card-img" src="motorola.png" alt="Produto">
            </div>
            <h2>Produto 4</h2>
            <p>Motorola G52.</p>
            <span>R$ 249,90</span>
            <button>Comprar</button>
        </div>
    </main>
</body>
</html>
